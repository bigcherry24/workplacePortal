spring.application.name=company-portal
spring.profiles.active=dev

# Server
server.port=8080
server.servlet.context-path=/

# Database (H2 - In-Memory)
spring.datasource.h2.jdbc-url=jdbc:h2:mem:testdb
spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.username=sa
spring.datasource.h2.password=

# Database (MySQL - Placeholder using H2 In-Memory for testing without local MySQL server)
spring.datasource.mysql.jdbc-url=jdbc:h2:mem:mysqldb;MODE=MySQL
spring.datasource.mysql.driver-class-name=org.h2.Driver
spring.datasource.mysql.username=sa
spring.datasource.mysql.password=

# H2 Console (개발용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# Logging
logging.level.root=INFO
logging.level.com.company.portal=DEBUG
